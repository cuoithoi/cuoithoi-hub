  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #fff0f5, #ffe4e1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 30px 20px;
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      color: #d14f61;
      font-size: 30px;
      margin-bottom: 12px;
    }

    .highlight-text {
      font-size: 20px;
      color: #1d2232;
      margin-bottom: 25px;
    }

    .free-tag {
      background-color: #ff69b4;
      color: white;
      padding: 6px 14px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 15px;
      display: inline-block;
      margin-top: 10px;
      animation: bounce 1.2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .link-button {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      color: #d14f61;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 14px;
      margin: 10px 0;
      font-size: 17px;
      font-weight: bold;
      width: 270px;
      height: 50px;
      transition: transform 0.25s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 8px rgba(209, 79, 97, 0.15);
      border: 2px solid #f3b2b8;
    }

    .link-button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 12px rgba(209, 79, 97, 0.25);
    }

    .emoji {
      font-size: 22px;
      margin-right: 10px;
    }

    .logo {
      max-width: 150px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>


  <h1>🎉 Chào mừng bạn đến với <strong>CUOI THOI</strong></h1>
  <div class="highlight-text">Nơi tạo thiệp cưới <strong>cực xinh</strong> chỉ trong vài phút</div>
  <div class="free-tag">🚀 Miễn phí 100% – Không cần đăng ký!</div>
