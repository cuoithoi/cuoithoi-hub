<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CUOI THOI - Trang trung gian</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #fff0f5, #ffe4e1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 30px 20px;
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      color: #d14f61;
      font-size: 30px;
      margin-bottom: 12px;
    }

    .highlight-text {
      font-size: 20px;
      color: #1d2232;
      margin-bottom: 25px;
    }

    .free-tag {
      background-color: #ff69b4;
      color: white;
      padding: 6px 14px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 15px;
      display: inline-block;
      margin-top: 10px;
      animation: bounce 1.2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .link-button {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 14px;
      margin: 10px 0;
      font-size: 17px;
      font-weight: bold;
      width: 270px;
      height: 50px;
      transition: transform 0.25s ease, box-shadow 0.3s ease;
      font-family: 'Quicksand', sans-serif;
      cursor: pointer;
    }

    .link-button.main {
      background-color: #d14f61;
      color: white;
      box-shadow: 0 6px 12px rgba(209, 79, 97, 0.3);
      border: none;
      animation: pulse 1.5s infinite;
    }

    /* 연한 톤 + 작게 */
.link-button.soft.small {
  width: 220px;
  height: 44px;
  font-size: 15px;
  padding: 10px 16px;
  border-radius: 12px;
}


    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    .link-button.soft {
      background-color: #ffeef0;
      color: #d14f61;
      border: 2px solid #fbd3d7;
      box-shadow: none;
    }

    .link-button.soft:hover {
      background-color: #fce4e6;
    }

    .emoji {
      font-size: 22px;
      margin-right: 10px;
    }

    .logo {
      max-width: 150px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <h1>🎉 Chào mừng bạn đến với <strong>CUOI THOI</strong></h1>
  <div class="highlight-text">Nơi tạo thiệp cưới <strong>cực xinh</strong> chỉ trong vài phút</div>
  <div class="free-tag">🚀"FREE luôn á! Tạo thử liền đi 😍" </div>

  <!-- 메인 강조 버튼 (외부 브라우저 열기) -->
  <button class="link-button main" onclick="openInExternalBrowser()">
    <span class="emoji">💌</span> Tạo thiệp cưới ngay
  </button>
  
<!-- 틱톡 버튼 (연한 톤 + 작게) -->
<a class="link-button soft small" href="https://www.tiktok.com/@cuoithoithiepcuoi?_t=ZS-8vgRh6k53Jf&_r=1" target="_blank">
    <span class="emoji">🎬</span> Xem trên TikTok
  </a>
  
  <!-- 페이스북 버튼 (연한 톤 + 작게) -->
  <a class="link-button soft small" href="https://www.facebook.com/share/18swAZCkYy/?mibextid=wwXIfr" target="_blank">
    <span class="emoji">📘</span> Theo dõi Facebook
  </a>
  

  <!-- 외부 브라우저 열기 스크립트 -->
  <script>
    function openInExternalBrowser() {
      // 이 링크는 반드시 보안 브라우저에서 열어야 하는 주소입니다
      const targetUrl = "https://cuoithoi.com.vn";
      window.location.href = targetUrl;
    }
  </script>

</body>
</html>
